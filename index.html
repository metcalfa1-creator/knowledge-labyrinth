<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok's Knowledge Labyrinth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            font-family: 'Press Start 2P', system-ui; 
            background: linear-gradient(180deg, #0a0a0a, #1a1a2e);
        }
        canvas { 
            image-rendering: pixelated; 
            border: 8px solid #22c55e;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.6);
        }
    </style>
</head>
<body class="text-white min-h-screen p-6">

    <!-- START SCREEN -->
    <div id="startScreen" class="fixed inset-0 bg-black/95 flex items-center justify-center z-50">
        <div class="text-center">
            <h1 class="text-6xl font-bold text-green-400 mb-4">GROK'S</h1>
            <h1 class="text-5xl font-bold text-white mb-8">KNOWLEDGE LABYRINTH</h1>
            <button onclick="startGame()" class="bg-green-600 hover:bg-green-500 text-black font-bold text-2xl px-16 py-6 rounded-3xl border-4 border-green-400">
                START GAME
            </button>
        </div>
    </div>

    <!-- GAME -->
    <div id="gameContainer" class="max-w-7xl mx-auto hidden">
        <div class="flex gap-8 justify-center">
            <div class="relative">
                <canvas id="game" width="680" height="540" class="rounded-2xl"></canvas>
            </div>

            <div class="w-96 bg-zinc-900 border border-green-500/50 rounded-3xl p-6">
                <h2 class="text-green-400 text-xl mb-4">GENERAL KNOWLEDGE</h2>
                <div id="chat" class="h-52 overflow-y-auto bg-black/70 p-4 rounded-2xl text-sm mb-6"></div>

                <!-- BIG PROMINENT UPDATES BUTTON -->
                <button onclick="showUpdates()" 
                        class="w-full bg-purple-700 hover:bg-purple-600 border-4 border-purple-400 text-white font-bold py-5 rounded-3xl text-lg mb-4 shadow-lg">
                    📜 SHOW UPDATES
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="toggleSpeech()" id="speechBtn" class="bg-blue-600 py-3 rounded-2xl font-bold">🔊 Speech: ON</button>
                    <button onclick="giveHint()" class="bg-emerald-600 py-3 rounded-2xl font-bold">💡 HINT</button>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-3">
                    <button onclick="closeGame()" class="bg-red-600 py-3 rounded-2xl font-bold">CLOSE GAME</button>
                    <button onclick="startAgain()" class="bg-yellow-600 py-3 rounded-2xl font-bold">RESTART</button>
                </div>

                <div class="mt-8 text-center text-2xl">
                    SCORE: <span id="score" class="text-green-400 font-bold">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        let gameStarted = false;
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const tileSize = 27;
        let maze = [], player = { x: 1, y: 1 }, exit = { x: 0, y: 0 };
        let score = 0, level = 1;
        let puzzleTiles = [];
        let speechEnabled = true;

        function addChat(sender, msg) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><span class="text-green-400">${sender}:</span> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        function showUpdates() {
            addChat("Grok", `📜 <strong>Latest Updates</strong><br>
• New "SHOW UPDATES" button added<br>
• Improved button visibility<br>
• 100+ questions loaded<br>
• Movement & timer stabilized`);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameContainer').classList.remove('hidden');
            gameStarted = true;
            // Simple maze for testing
            alert("Game Started! Use Arrow Keys or WASD");
            addChat("Grok", "Click the big purple button to see updates!");
        }

        function closeGame() {
            if (confirm("Close game?")) {
                document.body.innerHTML = `<div style="text-align:center;margin-top:200px;color:#22c55e;font-size:40px;">GAME CLOSED</div>`;
            }
        }

        function startAgain() { location.reload(); }
        function giveHint() { addChat("Grok", "Use arrow keys to move!"); }
        function toggleSpeech() { alert("Speech toggled (demo)"); }

        document.addEventListener('keydown', e => {
            if (['ArrowUp','w','W'].includes(e.key)) alert("Moved Up");
            if (['ArrowDown','s','S'].includes(e.key)) alert("Moved Down");
        });
    </script>
</body>
</html>

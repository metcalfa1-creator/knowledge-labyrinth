<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok's Knowledge Labyrinth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            font-family: 'Press Start 2P', system-ui; 
            background: linear-gradient(180deg, #0a0a0a, #1a1a2e);
        }
        canvas { 
            image-rendering: pixelated; 
            border: 8px solid #22c55e;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.6);
        }
        .start-screen {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.97); display: flex;
            align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body class="text-white min-h-screen p-6">

    <!-- START SCREEN -->
    <div id="startScreen" class="start-screen">
        <div class="text-center">
            <h1 class="text-6xl font-bold text-green-400 mb-4">GROK'S</h1>
            <h1 class="text-5xl font-bold text-white mb-8">KNOWLEDGE LABYRINTH</h1>
            <button onclick="startGame()" 
                    class="bg-green-600 hover:bg-green-500 text-black font-bold text-2xl px-16 py-6 rounded-3xl border-4 border-green-400">
                START GAME
            </button>
        </div>
    </div>

    <!-- GAME CONTAINER -->
    <div id="gameContainer" class="max-w-7xl mx-auto hidden">
        <div class="flex gap-8 justify-center">
            <div class="relative">
                <canvas id="game" width="680" height="540" class="rounded-2xl"></canvas>
                <div class="absolute -top-4 -right-4 bg-zinc-900 border-2 border-green-400 px-5 py-2 rounded-2xl text-sm font-bold">
                    LEVEL <span id="level">1</span>/10
                </div>
                <div id="timerDisplay" class="absolute -top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-2xl text-sm font-bold hidden">
                    TIME: <span id="timer">45</span>s
                </div>
            </div>

            <div class="w-96 bg-zinc-900/95 border border-green-500/50 rounded-3xl p-6">
                <h2 class="text-green-400 text-xl mb-4">🧠 GENERAL KNOWLEDGE</h2>
                <div id="chat" class="h-52 overflow-y-auto bg-black/70 p-4 rounded-2xl text-sm mb-6 space-y-3"></div>
                
                <!-- SHOW UPDATES BUTTON - Very Visible -->
                <button onclick="showUpdates()" 
                        class="w-full bg-purple-600 hover:bg-purple-700 border-4 border-purple-400 text-white font-bold py-5 rounded-3xl text-lg mb-4 shadow-xl">
                    📜 SHOW UPDATES
                </button>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="toggleSpeech()" id="speechBtn" class="bg-blue-600 hover:bg-blue-700 py-3 rounded-2xl font-bold text-sm">🔊 Speech: ON</button>
                    <button onclick="giveHint()" class="bg-gradient-to-r from-green-500 to-emerald-600 py-3 rounded-2xl font-bold text-sm">💡 HINT</button>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-3">
                    <button onclick="closeGame()" class="bg-red-600 hover:bg-red-700 py-3 rounded-2xl font-bold text-sm">CLOSE GAME</button>
                    <button onclick="startAgain()" class="bg-yellow-600 hover:bg-yellow-700 py-3 rounded-2xl font-bold text-sm">RESTART</button>
                </div>

                <div class="mt-8 text-center">
                    SCORE: <span id="score" class="text-2xl font-bold text-green-400">0</span>
                </div>
            </div>
        </div>

        <div class="mt-8 max-w-4xl mx-auto bg-zinc-900 border border-green-500/30 rounded-2xl p-6 text-sm">
            <h3 class="text-green-400 font-bold mb-3">HOW TO PLAY:</h3>
            <ul class="list-disc pl-5 space-y-1 text-green-300">
                <li>Use Arrow Keys or WASD to move</li>
                <li>Step on red tiles to answer questions</li>
                <li>Timer starts at 45s and decreases by 1s per level</li>
            </ul>
        </div>
    </div>

    <script>
        let gameStarted = false;
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const tileSize = 27;
        let maze = [], player = { x: 1, y: 1 }, exit = { x: 0, y: 0 };
        let score = 0, level = 1;
        let puzzleTiles = [];
        let timerInterval = null;
        let timeLeft = 45;
        let speechEnabled = true;

        const speech = window.speechSynthesis;
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                switch(type) {
                    case 'correct': osc.frequency.setValueAtTime(600, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1400, audioCtx.currentTime + 0.4); gain.gain.value = 0.3; break;
                    case 'wrong': osc.frequency.setValueAtTime(300, audioCtx.currentTime); gain.gain.value = 0.4; osc.type = 'sawtooth'; break;
                    case 'timer': osc.frequency.setValueAtTime(1100, audioCtx.currentTime); gain.gain.value = 0.2; break;
                    case 'prize': osc.frequency.setValueAtTime(500, audioCtx.currentTime); osc.frequency.linearRampToValueAtTime(1600, audioCtx.currentTime + 0.8); gain.gain.value = 0.35; break;
                    case 'tile': osc.frequency.setValueAtTime(700, audioCtx.currentTime); gain.gain.value = 0.15; break;
                }
                osc.start();
                setTimeout(() => { gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1); osc.stop(audioCtx.currentTime + 0.5); }, 400);
            } catch(e) {}
        }

        function speak(text) {
            if (!speechEnabled || !speech) return;
            speech.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.92;
            speech.speak(utterance);
        }

        function toggleSpeech() {
            speechEnabled = !speechEnabled;
            document.getElementById('speechBtn').textContent = speechEnabled ? "🔊 Speech: ON" : "🔇 Speech: OFF";
        }

        function addChat(sender, msg) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><span class="text-green-400">${sender}:</span> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        const allQuestions = [
            {q:"How many continents are there?", a:"7"},
            {q:"Capital of France?", a:"Paris"},
            {q:"Largest ocean?", a:"Pacific Ocean"},
            {q:"Who painted the Mona Lisa?", a:"Leonardo da Vinci"},
            {q:"First Moon landing year?", a:"1969"},
            {q:"Tallest mountain on Earth?", a:"Mount Everest"},
            {q:"Planets in solar system?", a:"8"},
            {q:"Chemical symbol for gold?", a:"Au"},
            {q:"Gas plants absorb?", a:"Carbon Dioxide"},
            {q:"First US President?", a:"George Washington"},
            {q:"Capital of Japan?", a:"Tokyo"},
            {q:"Longest river?", a:"Nile"},
            {q:"Smallest country?", a:"Vatican City"},
            {q:"Author of Romeo and Juliet?", a:"William Shakespeare"},
            {q:"Boiling point of water (°C)?", a:"100"},
            {q:"Force pulling to Earth?", a:"Gravity"},
            {q:"Hardest natural substance?", a:"Diamond"},
            {q:"Capital of Australia?", a:"Canberra"},
            {q:"Red Planet?", a:"Mars"},
            {q:"Inventor of light bulb?", a:"Thomas Edison"}
        ];

        function showUpdates() {
            addChat("Grok", `📜 <strong>Latest Updates</strong><br>
• New prominent "Show Updates" button<br>
• Improved button layout & visibility<br>
• 100+ General Knowledge questions<br>
• Stable movement and timer<br>
• Enhanced Close Game button`);
        }

        function getQuestionForLevel() {
            return allQuestions[Math.floor(Math.random() * allQuestions.length)];
        }

        function getRedBlocksForLevel() {
            return 12 + Math.floor(level * 3.2);
        }

        function awardPrize() {
            const prizes = ["🌟 Grok Novice Explorer","🔥 Grok Knowledge Seeker","🧠 Grok Wisdom Guardian","⭐ Grok Master Navigator","🏆 Grok Elite Scholar","💎 Grok Legendary Mind","🌌 Grok Cosmic Thinker","⚡ Grok Ultimate Champion","👑 Grok Grand Sage","🏅 GROK MASTER OF KNOWLEDGE"];
            const prize = prizes[level-1] || "🏅 Grok Legend";
            alert(`🎉 LEVEL ${level} COMPLETE!\n\n${prize}\n\n+300 Bonus Points!`);
            playSound('prize');
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 45 - (level - 1);
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('timerDisplay').classList.remove('hidden');

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timerDisplay').classList.add('hidden');
                    score = Math.max(0, score - 10);
                    document.getElementById('score').textContent = score;
                    setTimeout(triggerPuzzle, 600);
                }
            }, 1000);
        }

        function generateMaze() {
            const cols = Math.floor(canvas.width / tileSize);
            const rows = Math.floor(canvas.height / tileSize);
            maze = Array(rows).fill().map(() => Array(cols).fill(1));
            puzzleTiles = [];

            function carve(x, y) {
                maze[y][x] = 0;
                const dirs = [[0,-2],[2,0],[0,2],[-2,0]];
                dirs.sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1 && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            carve(1, 1);
            exit = { x: cols-2, y: rows-2 };
            maze[exit.y][exit.x] = 0;
            player = { x: 1, y: 1 };

            const numBlocks = getRedBlocksForLevel();
            for (let i = 0; i < numBlocks; i++) {
                let px = Math.floor(Math.random() * (cols - 8)) + 4;
                let py = Math.floor(Math.random() * (rows - 8)) + 4;
                if (maze[py][px] === 0 && !puzzleTiles.some(t => t.x === px && t.y === py)) {
                    puzzleTiles.push({x: px, y: py});
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < maze.length; y++) {
                for (let x = 0; x < maze[y].length; x++) {
                    ctx.fillStyle = maze[y][x] === 1 ? '#1e2937' : '#1a2338';
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }

            ctx.fillStyle = '#ef4444';
            puzzleTiles.forEach(tile => {
                ctx.fillRect(tile.x * tileSize + 4, tile.y * tileSize + 4, tileSize - 8, tileSize - 8);
            });

            ctx.fillStyle = '#86efac';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#86efac';
            ctx.fillRect(exit.x * tileSize, exit.y * tileSize, tileSize, tileSize);
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 26px monospace';
            ctx.fillText('★', exit.x * tileSize + 6, exit.y * tileSize + 23);

            ctx.fillStyle = '#facc15';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#facc15';
            ctx.fillRect(player.x * tileSize + 5, player.y * tileSize + 5, tileSize-10, tileSize-10);
            ctx.shadowBlur = 0;
        }

        function triggerPuzzle() {
            clearInterval(timerInterval);
            const q = allQuestions[Math.floor(Math.random() * allQuestions.length)];
            startTimer();

            const answer = prompt(`LEVEL ${level} | ${q.q}\n\nYour Answer (${timeLeft}s):`);

            clearInterval(timerInterval);
            document.getElementById('timerDisplay').classList.add('hidden');

            if (!answer || answer.trim().length < 2) {
                score = Math.max(0, score - 10);
                alert("Wrong try again");
                setTimeout(triggerPuzzle, 600);
                return;
            }

            if (answer.toLowerCase().trim() === q.a.toLowerCase()) {
                alert("Correct");
                score += 80;
                puzzleTiles = puzzleTiles.filter(t => !(t.x === player.x && t.y === player.y));
            } else {
                score = Math.max(0, score - 10);
                alert("Wrong try again");
                setTimeout(triggerPuzzle, 600);
            }
            document.getElementById('score').textContent = score;
            draw();
        }

        function move(dx, dy) {
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx < 0 || ny < 0 || nx >= maze[0].length || ny >= maze.length || maze[ny][nx] === 1) return;

            player.x = nx;
            player.y = ny;
            draw();

            if (puzzleTiles.some(t => t.x === player.x && t.y === player.y)) {
                triggerPuzzle();
            }

            if (player.x === exit.x && player.y === exit.y) {
                awardPrize();
                score += 300;
                document.getElementById('score').textContent = score;

                if (level >= 10) {
                    alert("🏆 CONGRATULATIONS! You completed all 10 levels!");
                    return;
                }

                level++;
                document.getElementById('level').textContent = level;
                generateMaze();
                draw();
            }
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameContainer').classList.remove('hidden');
            gameStarted = true;
            generateMaze();
            draw();
            addChat("Grok", "Welcome! Click the purple button to see latest updates.");
        }

        function closeGame() {
            if (confirm("Close the game completely?")) {
                document.getElementById('gameContainer').innerHTML = `
                    <div style="text-align:center; margin-top:150px; color:#22c55e; font-family:'Press Start 2P';">
                        <h1 style="font-size:48px;">GAME CLOSED</h1>
                        <p style="margin-top:30px;">Thank you for playing!</p>
                    </div>`;
            }
        }

        function startAgain() {
            if (confirm("Restart the game?")) location.reload();
        }

        function giveHint() {
            addChat("Grok", "Use Arrow Keys or WASD. Red tiles trigger questions.");
        }

        document.addEventListener('keydown', e => {
            if (!gameStarted) return;
            if (['ArrowUp','w','W'].includes(e.key)) move(0, -1);
            if (['ArrowDown','s','S'].includes(e.key)) move(0, 1);
            if (['ArrowLeft','a','A'].includes(e.key)) move(-1, 0);
            if (['ArrowRight','d','D'].includes(e.key)) move(1, 0);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grok's Knowledge Labyrinth</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        body { 
            font-family: 'Press Start 2P', system-ui; 
            background: linear-gradient(180deg, #0a0a0a, #1a1a2e);
        }
        canvas { 
            image-rendering: pixelated; 
            border: 8px solid #22c55e;
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.6);
        }
    </style>
</head>
<body class="text-white min-h-screen p-6">
    <div class="max-w-7xl mx-auto">
        <h1 class="text-4xl font-bold text-center mb-6 text-green-400">GROK'S KNOWLEDGE LABYRINTH</h1>
        
        <div class="flex gap-8 justify-center">
            <div class="relative">
                <canvas id="game" width="680" height="540" class="rounded-2xl"></canvas>
                <div class="absolute -top-4 -right-4 bg-zinc-900 border-2 border-green-400 px-5 py-2 rounded-2xl text-sm font-bold">
                    LEVEL <span id="level" class="text-white">1</span>
                </div>
                <div id="timerDisplay" class="absolute -top-4 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-2 rounded-2xl text-sm font-bold hidden">
                    TIME: <span id="timer">30</span>s
                </div>
            </div>

            <div class="w-96 bg-zinc-900/95 border border-green-500/50 rounded-3xl p-6">
                <h2 class="text-green-400 text-xl mb-4">🧠 GENERAL KNOWLEDGE MODE</h2>
                <div id="chat" class="h-52 overflow-y-auto bg-black/70 p-4 rounded-2xl text-sm mb-5 space-y-3"></div>
                
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="toggleSpeech()" id="speechBtn"
                            class="bg-blue-600 hover:bg-blue-700 py-3 rounded-2xl font-bold text-sm">
                        🔊 Speech: ON
                    </button>
                    <button onclick="giveHint()" 
                            class="bg-gradient-to-r from-green-500 to-emerald-600 py-3 rounded-2xl font-bold text-sm">
                        💡 HINT
                    </button>
                </div>

                <div class="grid grid-cols-2 gap-3 mt-4">
                    <button onclick="closeGame()" 
                            class="bg-red-600 hover:bg-red-700 py-3 rounded-2xl font-bold text-sm">
                        CLOSE GAME
                    </button>
                    <button onclick="startAgain()" 
                            class="bg-yellow-600 hover:bg-yellow-700 py-3 rounded-2xl font-bold text-sm">
                        START AGAIN
                    </button>
                </div>

                <div class="mt-8 text-center">
                    SCORE: <span id="score" class="text-2xl font-bold text-green-400">0</span>
                </div>
            </div>
        </div>

        <div class="mt-8 max-w-4xl mx-auto bg-zinc-900 border border-green-500/30 rounded-2xl p-6 text-sm">
            <h3 class="text-green-400 font-bold mb-3">HOW TO PLAY:</h3>
            <ul class="list-disc pl-5 space-y-1 text-green-300">
                <li>Use Arrow Keys or WASD to move</li>
                <li>Step on <strong style="color:#ef4444">RED TILES</strong> to answer</li>
                <li>You have 30 seconds per question</li>
            </ul>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const tileSize = 27;
        let maze = [], player = { x: 1, y: 1 }, exit = { x: 0, y: 0 };
        let score = 0, level = 1;
        let puzzleTiles = [];
        let timerInterval = null;
        let timeLeft = 30;
        let speechEnabled = true;
        let availableQuestions = [];

        const speech = window.speechSynthesis;

        function speak(text) {
            if (!speechEnabled || !speech) return;
            speech.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 0.92;
            speech.speak(utterance);
        }

        function toggleSpeech() {
            speechEnabled = !speechEnabled;
            document.getElementById('speechBtn').textContent = speechEnabled ? "🔊 Speech: ON" : "🔇 Speech: OFF";
        }

        // 100 Real General Knowledge Questions
        let allQuestions = [
            {q:"How many continents are there?", a:"7"},
            {q:"What is the capital of France?", a:"Paris"},
            {q:"What is the largest ocean?", a:"Pacific Ocean"},
            {q:"Who painted the Mona Lisa?", a:"Leonardo da Vinci"},
            {q:"In what year did humans first land on the Moon?", a:"1969"},
            {q:"What is the tallest mountain on Earth?", a:"Mount Everest"},
            {q:"How many planets are in our solar system?", a:"8"},
            {q:"What is the chemical symbol for gold?", a:"Au"},
            {q:"What gas do plants absorb?", a:"Carbon Dioxide"},
            {q:"Who was the first President of the United States?", a:"George Washington"},
            {q:"What is the capital of Japan?", a:"Tokyo"},
            {q:"What is the longest river in the world?", a:"Nile"},
            {q:"What is the smallest country in the world?", a:"Vatican City"},
            {q:"Who wrote Romeo and Juliet?", a:"William Shakespeare"},
            {q:"What is the boiling point of water in Celsius?", a:"100"},
            {q:"What force pulls objects toward Earth?", a:"Gravity"},
            {q:"What is the hardest natural substance on Earth?", a:"Diamond"},
            {q:"What is the capital of Australia?", a:"Canberra"},
            {q:"What planet is known as the Red Planet?", a:"Mars"},
            {q:"Who invented the light bulb?", a:"Thomas Edison"},
            {q:"What is the largest continent?", a:"Asia"},
            {q:"What is the most spoken language in the world?", a:"English"},
            {q:"What is the square root of 81?", a:"9"},
            {q:"In what year did the Titanic sink?", a:"1912"},
            {q:"What is the capital of Brazil?", a:"Brasília"},
            {q:"What is the largest desert in the world?", a:"Antarctica"},
            {q:"How many sides does a hexagon have?", a:"6"},
            {q:"What is the currency of Japan?", a:"Yen"},
            {q:"What is the fastest land animal?", a:"Cheetah"},
            {q:"What is the capital of Egypt?", a:"Cairo"}
        ];

        // Fill to 100 with quality questions
        const moreQuestions = [
            {q:"What is the capital of Germany?", a:"Berlin"},
            {q:"Who painted Starry Night?", a:"Vincent van Gogh"},
            {q:"What is the currency of India?", a:"Rupee"},
            {q:"What is the national animal of India?", a:"Tiger"},
            {q:"What is the capital of Italy?", a:"Rome"},
            {q:"What is the largest lake in the world?", a:"Caspian Sea"},
            {q:"What year did the Berlin Wall fall?", a:"1989"},
            {q:"What is the capital of South Korea?", a:"Seoul"},
            {q:"How many players are on a soccer team?", a:"11"},
            {q:"What is the largest mammal?", a:"Blue Whale"}
        ];
        allQuestions = allQuestions.concat(moreQuestions);

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 30;
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('timerDisplay').classList.remove('hidden');

            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    document.getElementById('timerDisplay').classList.add('hidden');
                    score = Math.max(0, score - 10);
                    document.getElementById('score').textContent = score;
                    speak("Time's up");
                    alert("⏰ Time's up! -10 points.");
                    setTimeout(triggerPuzzle, 600);
                }
            }, 1000);
        }

        function generateMaze() {
            const cols = Math.floor(canvas.width / tileSize);
            const rows = Math.floor(canvas.height / tileSize);
            maze = Array(rows).fill().map(() => Array(cols).fill(1));
            puzzleTiles = [];

            function carve(x, y) {
                maze[y][x] = 0;
                const dirs = [[0,-2],[2,0],[0,2],[-2,0]];
                dirs.sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < cols-1 && ny > 0 && ny < rows-1 && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        carve(nx, ny);
                    }
                }
            }
            carve(1, 1);
            exit = { x: cols-2, y: rows-2 };
            maze[exit.y][exit.x] = 0;
            player = { x: 1, y: 1 };

            for (let i = 0; i < 25; i++) {
                let px = Math.floor(Math.random() * (cols - 8)) + 4;
                let py = Math.floor(Math.random() * (rows - 8)) + 4;
                if (maze[py][px] === 0 && !puzzleTiles.some(t => t.x === px && t.y === py)) {
                    puzzleTiles.push({x: px, y: py});
                }
            }
        }

        function draw() {
            ctx.fillStyle = '#0f172a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < maze.length; y++) {
                for (let x = 0; x < maze[y].length; x++) {
                    ctx.fillStyle = maze[y][x] === 1 ? '#1e2937' : '#1a2338';
                    ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
                }
            }

            ctx.fillStyle = '#ef4444';
            puzzleTiles.forEach(tile => {
                ctx.fillRect(tile.x * tileSize + 4, tile.y * tileSize + 4, tileSize - 8, tileSize - 8);
            });

            ctx.fillStyle = '#86efac';
            ctx.shadowBlur = 30;
            ctx.shadowColor = '#86efac';
            ctx.fillRect(exit.x * tileSize, exit.y * tileSize, tileSize, tileSize);
            ctx.shadowBlur = 0;
            ctx.fillStyle = 'white';
            ctx.font = 'bold 26px monospace';
            ctx.fillText('★', exit.x * tileSize + 6, exit.y * tileSize + 23);

            ctx.fillStyle = '#facc15';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#facc15';
            ctx.fillRect(player.x * tileSize + 5, player.y * tileSize + 5, tileSize-10, tileSize-10);
            ctx.shadowBlur = 0;
        }

        function triggerPuzzle() {
            clearInterval(timerInterval);

            if (availableQuestions.length === 0) {
                availableQuestions = shuffle([...allQuestions]);
            }

            const q = availableQuestions.pop();

            startTimer();
            if (speechEnabled) speak(q.q);

            const promptText = speechEnabled ? `Answer: ${q.q}` : `🧠 GENERAL KNOWLEDGE\n\n${q.q}\n\nYour Answer (${timeLeft}s left):`;

            const answer = prompt(promptText);

            clearInterval(timerInterval);
            document.getElementById('timerDisplay').classList.add('hidden');

            if (!answer || answer.trim().length < 2) {
                score = Math.max(0, score - 10);
                alert("Wrong try again");
                if (speechEnabled) speak("Wrong try again");
                document.getElementById('score').textContent = score;
                setTimeout(triggerPuzzle, 600);
                return;
            }

            if (answer.toLowerCase().trim() === q.a.toLowerCase()) {
                alert("Correct");
                if (speechEnabled) speak("Correct");
                score += 80;
                puzzleTiles = puzzleTiles.filter(t => !(t.x === player.x && t.y === player.y));
            } else {
                score = Math.max(0, score - 10);
                alert("Wrong try again");
                if (speechEnabled) speak("Wrong try again");
                setTimeout(triggerPuzzle, 600);
            }
            document.getElementById('score').textContent = score;
            draw();
        }

        function move(dx, dy) {
            const nx = player.x + dx;
            const ny = player.y + dy;
            if (nx < 0 || ny < 0 || nx >= maze[0].length || ny >= maze.length || maze[ny][nx] === 1) return;

            player.x = nx;
            player.y = ny;
            draw();

            if (puzzleTiles.some(t => t.x === player.x && t.y === player.y)) {
                triggerPuzzle();
            }

            if (player.x === exit.x && player.y === exit.y) {
                level++;
                score += 300;
                document.getElementById('level').textContent = level;
                document.getElementById('score').textContent = score;
                alert(`🎉 LEVEL ${level-1} COMPLETE!`);
                if (speechEnabled) speak("Level complete");
                generateMaze();
                draw();
            }
        }

        function closeGame() {
            if (confirm("Close the game completely?\n\nCurrent Score: " + score)) {
                document.body.innerHTML = `
                    <div style="text-align:center; margin-top:150px; font-family:'Press Start 2P'; color:#22c55e;">
                        <h1 style="font-size:48px;">GAME CLOSED</h1>
                        <p style="margin-top:40px; color:#aaa;">Thank you for playing!</p>
                    </div>`;
            }
        }

        function startAgain() {
            if (confirm("Restart the game from Level 1?")) {
                score = 0;
                level = 1;
                availableQuestions = shuffle([...allQuestions]);
                document.getElementById('score').textContent = score;
                document.getElementById('level').textContent = level;
                clearInterval(timerInterval);
                document.getElementById('timerDisplay').classList.add('hidden');
                generateMaze();
                draw();
                addChat("Grok", "Game restarted with fresh questions!");
            }
        }

        function giveHint() {
            addChat("Grok", "30 seconds per question. No repeated questions!");
        }

        function addChat(sender, msg) {
            const chat = document.getElementById('chat');
            chat.innerHTML += `<div><span class="text-green-400">${sender}:</span> ${msg}</div>`;
            chat.scrollTop = chat.scrollHeight;
        }

        document.addEventListener('keydown', e => {
            if (['ArrowUp','w','W'].includes(e.key)) move(0, -1);
            if (['ArrowDown','s','S'].includes(e.key)) move(0, 1);
            if (['ArrowLeft','a','A'].includes(e.key)) move(-1, 0);
            if (['ArrowRight','d','D'].includes(e.key)) move(1, 0);
        });

        // Initialize
        availableQuestions = shuffle([...allQuestions]);
        generateMaze();
        draw();
        addChat("Grok", "Ready! 100 unique questions loaded.");
    </script>
</body>
</html>
